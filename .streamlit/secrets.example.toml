[connections.azure_sql]
# Si cambia la IP/NAT publica del host Linux, actualice el allowlist del logical server en Azure SQL
# antes de publicar y valide con `python scripts/smoke_test_runtime.py`.
server = "tcp:your-server.database.windows.net"
database = "your_database"
username = "your_user"
password = "your_password"
driver = "ODBC Driver 18 for SQL Server"

[mail.smtp]
host = "smtp.example.com"
port = 587
username = "smtp_user"
password = "smtp_password"
from_email = "no-reply@example.com"
from_name = "Form Fruta Comercial"
use_tls = true
use_ssl = false
