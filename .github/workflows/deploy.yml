name: Build And Deploy

on:
  push:
    branches:
      - main
      - feature/mvp-streamlit
  workflow_dispatch:
    inputs:
      deploy_branch:
        description: Branch to validate and deploy
        required: false
        default: feature/mvp-streamlit

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_branch || github.ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ODBC Driver 18
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates curl gnupg unixodbc unixodbc-dev gcc g++
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --dearmor --batch --yes -o /etc/apt/keyrings/microsoft.gpg
          sudo chmod go+r /etc/apt/keyrings/microsoft.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/microsoft.gpg] https://packages.microsoft.com/debian/12/prod bookworm main" | sudo tee /etc/apt/sources.list.d/microsoft-prod.list >/dev/null
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y --no-install-recommends msodbcsql18

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile project
        run: python -m compileall streamlit_app.py core services scripts engine.py

      - name: Smoke runtime without database
        run: python scripts/smoke_test_runtime.py --skip-db

      - name: Smoke email job
        run: python scripts/send_operacion_status_email.py --dry-run --force-digest --skip-alerts

      - name: Build Docker image
        run: docker build -t form-fruta-comercial:ci .

  deploy:
    needs: validate
    if: github.event_name == 'workflow_dispatch' || github.ref_name == 'feature/mvp-streamlit'
    runs-on: [self-hosted, linux, x64, formfruta-ol9]
    env:
      PROD_APP_DIR: ${{ vars.PROD_APP_DIR || '/home/soporte/FormFrutaComercial' }}
      DEPLOY_BRANCH: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_branch || 'feature/mvp-streamlit' }}

    steps:
      - name: Deploy to production
        run: |
          cd "$PROD_APP_DIR"
          bash deploy/deploy_prod.sh "$PROD_APP_DIR" "$DEPLOY_BRANCH"
